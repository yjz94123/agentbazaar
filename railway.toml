# railway.toml
# This file is used by Railway for deployment configuration.
# Two services are deployed from this monorepo:
#
#   agentbazaar-api:
#     buildCommand = "npm run build -w apps/api"
#     startCommand = "node apps/api/dist/server.js"
#
#   agentbazaar-web:
#     buildCommand = "npm run build -w apps/web"
#     startCommand = "npm run start -w apps/web"
#
# Each service uploads this repo with the appropriate railway.toml overwritten before `railway up`.
# See DEPLOY.md for full deployment instructions.

[build]
builder = "NIXPACKS"
